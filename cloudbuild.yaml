steps:
  # 1. Construir la imagen usando el Dockerfile de Bun
  # Usamos $SHORT_SHA para que cada versión sea única (ideal para rollbacks)
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/mi-registro/frontend-next:$SHORT_SHA', 
      '.'
    ]

  # 2. Subir la imagen al Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/mi-registro/frontend-next:$SHORT_SHA'
    ]

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mi-frontend-next'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mi-registro/frontend-next:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Registramos la imagen para que aparezca en el historial de Cloud Build
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mi-registro/frontend-next:$SHORT_SHA'
